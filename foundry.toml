[profile.default]
src = "src"
out = "out"
libs = ["node_modules", "lib"]
test = "test"
script = "script"
solc_version = "0.8.26"
evm_version = "cancun"
optimizer = true
optimizer_runs = 44444444
via_ir = true
fs_permissions = [
  { access = "read-write", path = "./deployments" }
]

[rpc_endpoints]
xlayer = "${XLAYER_RPC_URL}"
